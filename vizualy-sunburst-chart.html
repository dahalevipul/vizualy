        var newData = {

                "children": [{ "name": "Sub A1", "title": "D", "size": 4 }, { "name": "Sub A2", "title": "D", "size": 4 }]
            }]
        };

        // create sunburst chart object
        var sunburstchart = new vizualy.SunburstChart();



        var settings = {
            dimension: {
                margin: { top: 50, right: 0, bottom: 0, left: 0 }
            },
            // labelKey : 'name',
            label: {
                dataKey: 'name',
            },
            legend: {
                isVisible: true
            }
        };
        // create sunburstchart chart
        sunburstchart
            .container("chartContainer")
            .x("name")
            .y("size")
            .data(data)
            .settings(settings)
            .on('beforeDraw', () => {
                console.log("Chart drawing started");
            })
            .on('completeDraw', () => {
                console.log("Chart drawing completed");
            })
            .on('beforeUpdate', () => {
                console.log("Chart update Started");
            })
            .on('completeUpdate', () => {
                console.log("Chart udpate completed");
            })
            .on('error', () => {
                console.log("Error occurred");
            })
            .draw();


        // no data scenario
        // setTimeout(() => {
        //     sunburstchart.data([]).update();
        // }, 3000);


        //update chart with new data
        setTimeout(() => {
            sunburstchart.data(newData).update();
        }, 1000);

        setTimeout(() => {
            sunburstchart.data(data).update();
        }, 2000);

        setTimeout(() => {
            sunburstchart.data(newData).update();
        }, 3000);

        setTimeout(() => {
            sunburstchart.data(data).update();
        }, 4000);
