        // create bar chart object
        var areachart = new vizualy.AreaChart();

        // create bar chart
        areachart
            .container("chartContainer")
            .x("date")
            .y("count")
            .area("key")
            .data(data2)
            .settings({
                dimension: {
                    margin: { top: 30, right: 30, bottom: 50, left: 90 }
                },
                rotateXAxisTick: {
                    isVisible: false,
                    value: [-10, 10, 10] // [relative X position of ticks label, relative y position, rotation-angle]
                },
                brush: {
                    isVisible: true,
                    limit: 80,
                    offset: 20,
                    height: 80,
                    margin: 60
                },
                xWordWrap: {
                    isVisible: true,
                    linesToAddEllipses: 3
                }
            })
