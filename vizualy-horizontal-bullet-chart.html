<!DOCTYPE html>
<html lang="en-IN">
    <head>
        <meta charset="utf-8">
        <title>UXP Horizontal Bullet chart</title>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./vizualy-assistant/src/css/common.css">
        <style>
            html, body {
                width: 100%;
                height: 100%;
                margin: 0px;
            }
            #chartContainer {
                height: 70%;
                width: calc(100% - 20px);
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <div id="chartContainer">
            <!-- <svg width="960" height="500"></svg> -->
        </div>

        <script type="text/javascript" src="./libs/d3.v6.min.js"></script>
        <script type="text/javascript" src="./vizualy-assistant/src/js/utility.js"></script>
        <script type="text/javascript" src="./vizualy-assistant/src/js/assistant.js"></script>
        <script type="text/javascript" src="./vizualy-assistant/src/js/observer.js"></script>
        <script type="text/javascript" src="./vizualy-horizontal-bullet-chart/vizualy-horizontal-bullet-chart.js"></script>
        <script type="text/javascript" src="./vizualy/vizualy.js"></script>
        <script type="text/javascript">
            // create vertical Grouped Bar chart
            var horizontalBulletchart = new vizualy.HorizontalBulletChart();
            var hbData = {
                yAxis: "salesperson",
                xAxis: [{
                    "key": "sales",
                    "value": "Sales",
                    "type": "range"
                }, {
                    "key": "hr",
                    "value": "HEG",
                    "type": "marker"
                }, {
                    "key": "marketing",
                    "value": "Marketing",
                    "type": "measure"
                }],
                colors: ["#a05d56", "#6b486b", "#ff8c00"],
                data: [
                    {
                        "sales": 52,
                        "marketing": 110,
                        "hr": 250,
                        "salesperson": "A salesperson"
                    },
                    {
                        "sales": 600,
                        "marketing": 1200,
                        "salesperson": "B salesperson"
                    },
                    {
                        "sales": 850,
                        "marketing": 300,
                        "salesperson": "C salesperson"
                    },
                    {
                        "sales": 3052,
                        "marketing": 2300,
                        "salesperson": "D salesperson"
                    },
                    {
                        "sales": 55,
                        "marketing": 200,
                        "salesperson": "E salesperson"
                    },
                    {
                        "sales": 100,
                        "marketing": 242,
                        "salesperson": "F salesperson"
                    },
                    {
                        "sales": 12,
                        "marketing": 140,
                        "salesperson": "G salesperson"
                    }
                ]
            };

            horizontalBulletchart
                .container("chartContainer")
                .x(hbData.xAxis)
                .y(hbData.yAxis)
                .data(hbData.data)
                .colors(hbData.colors)
                .settings({
                    dimension: {
                        margin: {
                            top: 30,
                            right: 50,
                            bottom: 50,
                            left: 50
                        }
                    },
                    legend: {
                        isVisible: true
                    },
                    yWordWrap: {
                        isVisible: true,
                        linesToAddEllipses: 1
                    },
                    xWordWrap: {
                        isVisible: false,
                        linesToAddEllipses: 3
                    },
                    xAxis: {
                        isVisible: true,
                        isGridsVisible: true,
                        tickFormat: (d) => d
                    },
                    yAxis: {
                        isVisible: true,
                        isGridsVisible: true,
                        tickFormat: (d) => d
                    },
                    xAxisLabel: {
                        value: '',
                        margin: 40,
                        isVisible: true
                    },
                    yAxisLabel: {
                        value: '',
                        margin: 50,
                        isVisible: false
                    },
                    xAxisTicksCount: {
                        value: 3,
                        isApplied: true
                    },
                    rotateYAxisTick: {
                        value: [-45, -20, -40], // [relative Y position of ticks label, relative x position, rotation-angle]
                        isVisible: false
                    },
                    rotateXAxisTick: {
                        value: [-45, -20, -40], // [relative X position of ticks label, relative y position, rotation-angle]
                        isVisible: false
                    },
                    tooltip: {
                        isVisible: true,
                        // content: (d, chartObject) => "Some html",
                        placement: "top-right"
                    },
                    animation: {
                        isApplied: true,
                        duration: 750,
                        type: 'cubic'
                    },
                    isResponsive: true,
                    emptyDataMessage: 'No Data Available',
                    exceptionMessage: 'Something went wrong!! Please see logs.'
                })
                .on('beforeDraw', () => {
                    console.log("Chart drawing started");
                })
                .on('completeDraw', () => {
                    console.log("Chart drawing completed");
                })
                .on('beforeUpdate', () => {
                    console.log("Chart update Started");
                })
                .on('completeUpdate', () => {
                    console.log("Chart udpate completed");
                })
                .on('error', () => {
                    console.log("Error occurred");
                })
                .draw();
        </script>
    </body>
</html>
