                            fontSize: 12,
                            labelColor: '#2e7d32',
                            textAnchor: 'middle',
                            translateX: 0, // left (-ve value) | right (+ve value)
                            translateY: -10, // up (-ve value) | down (+ve value)
                            format: function (d) {
                                return d3.format('.2s')(d);
                            }

        // create line chart object
        var linechart = new vizualy.LineBarChart();

        // create line chart
        linechart
            .container("chartContainer")
            .x(x)
            .y(y)
            .stack('company')	// Setting z axis in data
            .data(lineBarData)
            .settings({
                dimension: {
                    margin: { top: 30, right: 70, bottom: 50, left: 90 }
                },
                rotateXAxisTick: {
                    isVisible: false,
                    value: [-10, 10, 10] // [relative X position of ticks label, relative y position, rotation-angle]
                },
                yAxisTicksCount: { value: 4, isApplied: true },
                xWordWrap: {
                    isVisible: true,
                    linesToAddEllipses: 3
                },
                brush: {
                    isVisible: true,
                    limit: 100,
                    offset: 0,
                    height: 80,
                    margin: 60
                }
            })
            .on('beforeDraw', () => {
                console.log("Chart drawing started");
            })

            })
            .on('beforeUpdate', () => {

            })
